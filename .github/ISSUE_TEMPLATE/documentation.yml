name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "docs: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which file or page needs attention?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
